# CI : exécute le pipeline ML puis la suite de tests à chaque push/PR.
# Le dataset et les scripts étant versionnés, `make test` entraîne les
# modèles (split + train) avant de lancer pytest, comme en local.
name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installation des dépendances
        run: |
          pip install -r back-end/requirements.txt
          pip install -r back-end/app/requirements.txt

      - name: Tests (pipeline ML + pytest)
        run: make test

      - name: Couverture de code
        run: make coverage
